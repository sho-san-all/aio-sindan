<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIO診断ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface2: #f0f0ee;
  --border: #e0e0dc;
  --accent: #c8281e;
  --accent2: #a01f16;
  --green: #1a7a4a;
  --yellow: #b07800;
  --red: #c8281e;
  --text: #1a1a1a;
  --muted: #888880;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}
.container { max-width:900px; margin:0 auto; padding:48px 24px; position:relative; z-index:1; }

/* Header */
header { text-align:center; margin-bottom:48px; }
.badge {
  display:inline-block;
  font-family:'Space Mono',monospace;
  font-size:10px; letter-spacing:3px;
  color:var(--accent); border:1px solid var(--accent); letter-spacing:3px;
  padding:4px 14px; margin-bottom:20px;
}
h1 {
  font-size:clamp(28px,5vw,48px); font-weight:900; letter-spacing:-1px;
  background:linear-gradient(135deg,#1a1a1a 0%,var(--accent) 60%,var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px;
}
.subtitle { color:var(--muted); font-family:'Space Mono',monospace; font-size:12px; }

/* Card */
.card {
  background:var(--surface); border:1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border-radius:12px; padding:28px; margin-bottom:20px;
}
.card-title {
  font-family:'Space Mono',monospace; font-size:10px;
  letter-spacing:2px; color:var(--muted); text-transform:uppercase;
  margin-bottom:20px; display:flex; align-items:center; gap:8px;
}
.card-title::before {
  content:''; width:6px; height:6px;
  background:var(--accent); border-radius:50%;
}

/* Section label */
.section-label {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:2px; color:var(--accent); text-transform:uppercase;
  margin-bottom:12px; margin-top:24px; padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.section-label:first-child { margin-top:0; }

/* Form grid */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.full { grid-column:1/-1; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group label {
  font-family:'Space Mono',monospace; font-size:10px;
  letter-spacing:1px; color:var(--muted); text-transform:uppercase;
}
.req { color:var(--accent2); }
.hint { font-size:10px; color:var(--muted); margin-top:2px; }

input[type="text"], input[type="url"], input[type="number"], select {
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text);
  font-family:'Noto Sans JP',sans-serif; font-size:13px;
  padding:11px 14px; outline:none; width:100%;
  transition:border-color 0.2s;
}
input:focus, select:focus { border-color:var(--accent); }
select { cursor:pointer; }
input[type="number"] { font-family:'Space Mono',monospace; }

/* Toggle group */
.toggle-group { display:flex; gap:6px; flex-wrap:wrap; }
.toggle-btn {
  padding:7px 14px; border-radius:20px; border:1px solid var(--border);
  background:var(--surface); color:var(--muted); font-size:12px;
  font-family:'Space Mono',monospace; cursor:pointer;
  transition:all 0.2s;
}
.toggle-btn.active { border-color:var(--accent); background:rgba(108,99,255,0.15); color:var(--accent); }
.toggle-btn.active-good { border-color:var(--green); background:rgba(74,222,128,0.1); color:var(--green); }
.toggle-btn.active-mid  { border-color:var(--yellow); background:rgba(251,191,36,0.1); color:var(--yellow); }
.toggle-btn.active-bad  { border-color:var(--red); background:rgba(248,113,113,0.1); color:var(--red); }

/* Run button */
.btn-run {
  width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 2px 8px rgba(200,40,30,0.25);
  color:white; border:none; border-radius:10px; padding:17px;
  font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
  letter-spacing:2px; cursor:pointer; margin-top:8px;
  transition:opacity 0.2s, transform 0.2s; text-transform:uppercase;
}
.btn-run:hover { opacity:0.9; transform:translateY(-1px); }

/* Results */
#results { display:none; }
#results.show { display:block; animation:fadeUp 0.4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* Score overview */
.score-overview {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:20px;
}
.score-big {
  background:var(--surface); border:1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border-radius:12px; padding:20px; text-align:center;
}
.score-big .num {
  font-family:'Space Mono',monospace; font-size:40px; font-weight:700;
  line-height:1;
}
.score-big .label {
  font-family:'Space Mono',monospace; font-size:10px;
  color:var(--muted); margin-top:6px; letter-spacing:1px;
}
.score-big small { font-size:16px; color:var(--muted); }

/* Score table */
.score-table { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:20px; }
.score-table th {
  background:#f0f0ee; padding:10px 14px; text-align:left;
  font-family:'Space Mono',monospace; font-size:10px;
  letter-spacing:1px; color:#666; text-transform:uppercase;
  border-bottom:2px solid var(--border);
}
.score-table td {
  padding:13px 14px; border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.score-table tr:last-child td { border-bottom:none; }
.score-table tr:hover td { background:rgba(200,40,30,0.03); }

.cat-tag {
  font-family:'Space Mono',monospace; font-size:9px;
  color:var(--muted); border:1px solid var(--border);
  padding:2px 6px; border-radius:3px; white-space:nowrap;
}
.rating {
  display:inline-flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:7px; font-weight:700; font-size:18px;
}
.r-good { background:rgba(26,122,74,0.12); color:var(--green); }
.r-mid  { background:rgba(176,120,0,0.12);  color:var(--yellow); }
.r-bad  { background:rgba(200,40,30,0.12); color:var(--red); }
.score-num { font-family:'Space Mono',monospace; font-size:12px; white-space:nowrap; }
.comment   { color:var(--muted); font-size:12px; line-height:1.7; }

/* Priority list */
.priority-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.priority-item {
  background:var(--surface); border:1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border-radius:10px; padding:16px 18px;
  display:flex; align-items:flex-start; gap:14px;
}
.priority-num {
  font-family:'Space Mono',monospace; font-size:11px;
  color:var(--accent); border:1px solid var(--accent); letter-spacing:3px;
  width:24px; height:24px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-top:1px;
}
.priority-content h4 { font-size:14px; font-weight:700; margin-bottom:4px; }
.priority-content p  { font-size:12px; color:var(--muted); line-height:1.6; }

/* Actions */
.actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.btn-sm {
  flex:1; min-width:120px; text-align:center;
  background:var(--surface2); color:var(--text);
  border:1px solid var(--border); border-radius:7px;
  padding:10px 18px; font-family:'Space Mono',monospace;
  font-size:11px; cursor:pointer; transition:all 0.2s;
}
.btn-sm:hover { border-color:var(--accent); color:var(--accent); }

/* GAS section */
.gas-section {
  background:var(--surface); border:1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border-radius:12px; padding:20px; margin-bottom:20px;
}
.gas-row { display:flex; gap:10px; margin-bottom:8px; }
.gas-row input { flex:1; }
.status-msg {
  font-family:'Space Mono',monospace; font-size:11px;
  padding:7px 12px; border-radius:5px; display:none;
}
.status-ok  { background:rgba(74,222,128,0.1); color:var(--green); display:block; }
.status-err { background:rgba(248,113,113,0.1); color:var(--red); display:block; }
.btn-sheets {
  width:100%; background:rgba(26,122,74,0.06);
  color:var(--green); border:1px solid var(--green);
  border-radius:8px; padding:13px;
  font-family:'Space Mono',monospace; font-size:12px;
  cursor:pointer; transition:all 0.2s; margin-top:10px;
}
.btn-sheets:hover { background:rgba(26,122,74,0.12); }
.btn-sheets:disabled { opacity:0.4; cursor:not-allowed; }

/* Progress bar */
.progress-wrap { background:var(--border); border-radius:99px; height:6px; margin-top:6px; }
.progress-bar  { height:6px; border-radius:99px; transition:width 0.6s ease; }

@media(max-width:600px){
  .form-grid,.form-grid-3{ grid-template-columns:1fr; }
  .full{ grid-column:1; }
  .score-overview{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="container">

<header>
  <div style="margin-bottom:24px">
    <div style="font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-1px;color:var(--text)">/<span style="color:var(--accent)">\</span> SHO-SAN</div>
  </div>
  <div class="badge">AIO DIAGNOSTIC SYSTEM</div>
  <h1>AIO診断ツール</h1>
  <p class="subtitle">// 数値を入力するだけで自動スコアリング・APIキー不要</p>
</header>

<!-- Input Form -->
<div class="card">
  <div class="card-title">クライアント情報</div>

  <div class="section-label">基本情報</div>
  <div class="form-grid">
    <div class="form-group full">
      <label>クライアント名 <span class="req">*</span></label>
      <input type="text" id="clientName" placeholder="例：株式会社NEO デザインホーム" />
    </div>
    <div class="form-group full">
      <label>HP URL</label>
      <input type="url" id="hpUrl" placeholder="https://example.com" />
    </div>
  </div>

  <div class="section-label">Ahrefs数値（手入力）</div>
  <div class="form-grid-3">
    <div class="form-group">
      <label>DR <span class="req">*</span></label>
      <input type="number" id="dr" placeholder="例：55" min="0" max="100" />
      <span class="hint">目標：50以上</span>
    </div>





  </div>

  <div class="section-label">サイト基盤（他ツール評価）</div>
  <div class="form-grid-3">
    <div class="form-group">
      <label>robots.txt</label>
      <select id="siteRobots">
        <option value="">未評価</option>
        <option value="◎">◎</option>
        <option value="○">○</option>
        <option value="△">△</option>
        <option value="×">×</option>
      </select>
    </div>
    <div class="form-group">
      <label>sitemap.xml</label>
      <select id="siteSitemap">
        <option value="">未評価</option>
        <option value="◎">◎</option>
        <option value="○">○</option>
        <option value="△">△</option>
        <option value="×">×</option>
      </select>
    </div>
    <div class="form-group">
      <label>JSON-LD</label>
      <select id="siteJsonld">
        <option value="">未評価</option>
        <option value="◎">◎</option>
        <option value="○">○</option>
        <option value="△">△</option>
        <option value="×">×</option>
      </select>
    </div>

    <div class="form-group">
      <label>全体評価</label>
      <select id="siteOverall">
        <option value="">未評価</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="E">E</option>
      </select>
    </div>
  </div>

  <div class="section-label">SNS（フォロワー数）</div>
  <div class="form-grid-3">
    <div class="form-group">
      <label>Instagram</label>
      <input type="number" id="igFollowers" placeholder="例：912" min="0" />
    </div>
    <div class="form-group">
      <label>YouTube 登録者数</label>
      <input type="number" id="ytSubs" placeholder="例：1985" min="0" />
    </div>
    <div class="form-group">
      <label>TikTok</label>
      <input type="number" id="ttFollowers" placeholder="例：0" min="0" />
    </div>
  </div>

  <div class="section-label">SNS 運用状況</div>
  <div class="form-grid">
    <div class="form-group">
      <label>Instagram 投稿頻度</label>
      <select id="igFreq">
        <option value="0">未運用</option>
        <option value="1">月1〜3回</option>
        <option value="2">週1〜2回</option>
        <option value="3">週3回以上</option>
      </select>
    </div>
    <div class="form-group">
      <label>Instagram リール</label>
      <select id="igReel">
        <option value="0">なし</option>
        <option value="1">たまにあり</option>
        <option value="2">定期投稿あり</option>
      </select>
    </div>
    <div class="form-group">
      <label>YouTube 投稿頻度</label>
      <select id="ytFreq">
        <option value="0">未運用</option>
        <option value="1">不定期</option>
        <option value="2">月1〜2回</option>
        <option value="3">週1回以上</option>
      </select>
    </div>
    <div class="form-group">
      <label>TikTok 投稿頻度</label>
      <select id="ttFreq">
        <option value="0">未運用</option>
        <option value="1">不定期</option>
        <option value="2">月4回以上</option>
      </select>
    </div>
  </div>

  <div class="section-label">MEO（Googleビジネスプロフィール）</div>
  <div class="form-grid-3">
    <div class="form-group">
      <label>口コミ件数</label>
      <input type="number" id="gbpReviews" placeholder="例：6" min="0" />
    </div>
    <div class="form-group">
      <label>平均評価</label>
      <input type="number" id="gbpRating" placeholder="例：3.7" min="0" max="5" step="0.1" />
    </div>
    <div class="form-group">
      <label>写真枚数</label>
      <input type="number" id="gbpPhotos" placeholder="例：30" min="0" />
    </div>
    <div class="form-group">
      <label>口コミ返信</label>
      <select id="gbpReply">
        <option value="0">ほぼ未返信</option>
        <option value="1">一部返信</option>
        <option value="2">ほぼ全件返信</option>
      </select>
    </div>
    <div class="form-group">
      <label>会社概要・サービス説明</label>
      <select id="gbpDesc">
        <option value="0">なし</option>
        <option value="1">あり</option>
      </select>
    </div>
    <div class="form-group">
      <label>投稿（Googleポスト）</label>
      <select id="gbpPost">
        <option value="0">なし</option>
        <option value="1">あり</option>
      </select>
    </div>
  </div>

  <div class="section-label">独自コンテンツ</div>
  <div class="form-grid">
    <div class="form-group">
      <label>お施主様インタビュー動画</label>
      <select id="interviewVideo">
        <option value="0">なし</option>
        <option value="1">あり（1〜4本）</option>
        <option value="2">あり（5本以上）</option>
      </select>
    </div>
    <div class="form-group">
      <label>お施主様インタビュー記事</label>
      <select id="interviewArticle">
        <option value="0">なし</option>
        <option value="1">あり（1〜4件）</option>
        <option value="2">あり（5件以上）</option>
      </select>
    </div>
    <div class="form-group">
      <label>FAQページ</label>
      <select id="faq">
        <option value="0">なし</option>
        <option value="1">あり（簡易）</option>
        <option value="2">あり（充実）</option>
      </select>
    </div>
    <div class="form-group">
      <label>コラム・ブログ記事数</label>
      <input type="number" id="columnCount" placeholder="例：5" min="0" />
    </div>
    <div class="form-group">
      <label>コラム更新頻度</label>
      <select id="columnFreq">
        <option value="0">なし・停止</option>
        <option value="1">不定期</option>
        <option value="2">月1回以上</option>
      </select>
    </div>
    <div class="form-group">
      <label>プレスリリース・メディア掲載</label>
      <select id="pr">
        <option value="0">なし</option>
        <option value="1">1〜2件</option>
        <option value="2">年3件以上</option>
      </select>
    </div>
  </div>

  <button class="btn-run" onclick="runDiagnosis()">▶ 診断を実行する</button>
</div>

<!-- GAS連携 -->
<div class="gas-section" id="gasSection" style="display:none">
  <div class="card-title" style="margin-bottom:12px">📊 スプレッドシートに保存</div>
  <div class="gas-row">
    <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/xxx/exec" />
    <button class="btn-sm" style="flex:none" onclick="saveGasUrl()">保存</button>
  </div>
  <div class="status-msg" id="gasStatus"></div>
  <button class="btn-sheets" id="sheetsBtn" onclick="saveToSheets()">📊 スプシに保存する</button>
</div>

<!-- Results -->
<div id="results">

  <div class="score-overview">
    <div class="score-big">
      <div class="num" id="rTotal" style="color:var(--red)">—</div>
      <div class="label">TOTAL SCORE / 100</div>
    </div>
    <div class="score-big">
      <div class="num" id="rDr" style="color:var(--muted)">—</div>
      <div class="label">DOMAIN RATING</div>
    </div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <table class="score-table">
      <thead>
        <tr>
          <th>大分類</th>
          <th>項目</th>
          <th>評価</th>
          <th>点数</th>
          <th>スコア</th>
          <th>所見</th>
        </tr>
      </thead>
      <tbody id="scoreBody"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">優先対策</div>
    <div class="priority-list" id="priorityList"></div>
  </div>

  <div class="actions">
    <button class="btn-sm" onclick="copyText()">📋 テキストをコピー</button>
    <button class="btn-sm" onclick="downloadCsv()">⬇ CSVダウンロード</button>
  </div>

</div>

</div>
<script>

async function fetchSiteName() {
  const url = document.getElementById('hpUrl').value.trim();
  if (!url) return;

  const btn    = document.getElementById('fetchBtn');
  const status = document.getElementById('fetchStatus');
  btn.disabled = true;
  btn.textContent = '取得中...';
  status.style.display = 'block';
  status.style.color = 'var(--muted)';
  status.textContent = '→ サイト情報を取得中...';

  // 複数プロキシを順番に試す
  const proxies = [
    () => fetch('https://corsproxy.io/?' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) }).then(r => r.text()),
    () => fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) }).then(r => r.text()),
    () => fetch('https://thingproxy.freeboard.io/fetch/' + url, { signal: AbortSignal.timeout(8000) }).then(r => r.text()),
  ];

  let html = '';
  for (const proxy of proxies) {
    try {
      html = await proxy();
      if (html && html.length > 100) break;
    } catch(e) { continue; }
  }

  try {
    if (!html) throw new Error('全プロキシ失敗');

    // og:site_name を優先
    const ogMatch = html.match(/<meta[^>]*property=["']og:site_name["'][^>]*content=["']([^"']+)["'][^>]*>/i)
                 || html.match(/<meta[^>]*content=["']([^"']+)["'][^>]*property=["']og:site_name["'][^>]*>/i);

    // <title>タグ
    const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);

    let title = '';
    if (ogMatch) {
      title = ogMatch[1].trim();
    } else if (titleMatch) {
      title = titleMatch[1].trim()
        .replace(/\s*[|｜\-–—].*$/, '')
        .replace(/\s*(公式サイト|トップページ|ホーム|TOP|Home).*$/i, '')
        .trim();
    }

    if (title) {
      document.getElementById('clientName').value = title;
      status.style.color = 'var(--green)';
      status.textContent = '✓ 取得しました：' + title;
    } else {
      status.style.color = 'var(--yellow)';
      status.textContent = '⚠ 自動取得できませんでした。手入力してください。';
    }
  } catch(e) {
    status.style.color = 'var(--red)';
    status.textContent = '⚠ 取得に失敗しました。手入力してください。';
  } finally {
    btn.disabled = false;
    btn.textContent = '社名を取得';
  }
}

// ============================================================
// スコアリングロジック
// ============================================================
function calcScore(v) {
  const dr          = parseFloat(v.dr)          || 0;
  const igFollowers = parseFloat(v.igFollowers) || 0;
  const ytSubs      = parseFloat(v.ytSubs)      || 0;
  const ttFollowers = parseFloat(v.ttFollowers) || 0;
  const igFreq      = parseInt(v.igFreq)        || 0;
  const igReel      = parseInt(v.igReel)        || 0;
  const ytFreq      = parseInt(v.ytFreq)        || 0;
  const ttFreq      = parseInt(v.ttFreq)        || 0;
  const gbpReviews  = parseFloat(v.gbpReviews)  || 0;
  const gbpRatingVal = parseFloat(v.gbpRating)   || 0;
  const gbpPhotos   = parseFloat(v.gbpPhotos)   || 0;
  const gbpReply    = parseInt(v.gbpReply)      || 0;
  const gbpDesc     = parseInt(v.gbpDesc)       || 0;
  const gbpPost     = parseInt(v.gbpPost)       || 0;
  const intVideo    = parseInt(v.interviewVideo)   || 0;
  const intArticle  = parseInt(v.interviewArticle) || 0;
  const faq         = parseInt(v.faq)           || 0;
  const columnCount = parseFloat(v.columnCount) || 0;
  const columnFreq  = parseInt(v.columnFreq)    || 0;
  const pr          = parseInt(v.pr)            || 0;

  const items = [];

  const siteRobots  = v.siteRobots  || '';
  const siteSitemap = v.siteSitemap || '';
  const siteJsonld  = v.siteJsonld  || '';
  const siteOverall = v.siteOverall || '';

  // ── 0. サイト基盤 (10点) ──
  // A=10 B=8 C=5 D=3 E=1 未評価=0
  const gradeToScore = g => ({'◎':10,'○':7,'△':4,'×':1,'A':10,'B':8,'C':5,'D':3,'E':1}[g] || 0);
  const gradeToRating = g => (['◎','○','A','B'].includes(g) ? '◎' : ['△','C'].includes(g) ? '△' : g ? '×' : '×');
  const overallToRating = g => (['A','B'].includes(g) ? '◎' : ['C'].includes(g) ? '△' : g ? '×' : '×');

  let siteScore = 0, siteRating = '×', siteComment = '';
  if (siteOverall) {
    // 全体評価がある場合はそれを優先
    siteScore = gradeToScore(siteOverall);
    siteRating = overallToRating(siteOverall);
    const details = [
      siteRobots  ? `robots.txt:${siteRobots}`  : null,
      siteSitemap ? `sitemap:${siteSitemap}`     : null,
      siteJsonld  ? `JSON-LD:${siteJsonld}`      : null,
    ].filter(Boolean).join(' / ');
    siteComment = `全体評価${siteOverall}。${details ? '（' + details + '）' : ''}${siteScore >= 8 ? 'AIクローラー対応・構造化データともに良好。' : siteScore >= 5 ? '一部対応済みだが改善余地あり。' : 'サイト基盤の整備が急務。'}`;
  } else if (siteRobots || siteSitemap || siteJsonld || siteCwv) {
    // 個別評価から平均を出す
    const grades = [siteRobots, siteSitemap, siteJsonld, siteCwv].filter(Boolean);
    const avg = grades.reduce((s, g) => s + gradeToScore(g), 0) / grades.length;
    siteScore = Math.round(avg);
    siteRating = siteScore >= 8 ? '◎' : siteScore >= 5 ? '△' : '×';
    const details = [
      siteRobots  ? `robots.txt:${siteRobots}`  : null,
      siteSitemap ? `sitemap:${siteSitemap}`     : null,
      siteJsonld  ? `JSON-LD:${siteJsonld}`      : null,
    ].filter(Boolean).join(' / ');
    siteComment = details + '。' + (siteScore >= 8 ? 'AIクローラー対応・構造化データともに良好。' : siteScore >= 5 ? '一部対応済みだが改善余地あり。' : 'サイト基盤の整備が急務。');
  } else {
    siteScore = 0; siteRating = '×'; siteComment = '未評価。他ツールで診断後に入力してください。';
  }
  items.push({ category:'サイト土台', name:'サイト基盤', rating:siteRating, score:siteScore, max:10, comment:siteComment });

  // ── 1. ドメインパワー (10点) ──
  let drScore=0, drRating='×', drComment='';
  if (dr >= 60)      { drScore=10; drRating='◎'; drComment=`DR${dr}。目標の60以上を達成。AIからの引用もされやすい状態。`; }
  else if (dr >= 50) { drScore=7;  drRating='◎'; drComment=`DR${dr}。目標の50以上を達成。引き続き被リンク獲得を継続。`; }
  else if (dr >= 40) { drScore=5;  drRating='△'; drComment=`DR${dr}。目標の50に近づいている。PRやメディア掲載で被リンク強化が必要。`; }
  else if (dr >= 20) { drScore=3;  drRating='△'; drComment=`DR${dr}。まだ低め。被リンク獲得とコンテンツ充実が急務。`; }
  else               { drScore=1;  drRating='×'; drComment=`DR${dr}。非常に低い状態。サイト基盤強化とPR活動が最優先。`; }
  items.push({ category:'サイト土台', name:'ドメインパワー(DR)', rating:drRating, score:drScore, max:10, comment:drComment });


  // ── 3. Instagram (20点) ──
  let igScore=0, igRating='×', igComment='';
  if (igFollowers === 0 && igFreq === 0) {
    igScore=0; igRating='×'; igComment='未運用。住宅業界でInstagramは必須チャネル。早急に開始が必要。';
  } else {
    let pts = 0;
    if (igFollowers >= 10000) pts += 8;
    else if (igFollowers >= 5000) pts += 6;
    else if (igFollowers >= 3000) pts += 5;
    else if (igFollowers >= 1000) pts += 3;
    else if (igFollowers >= 500)  pts += 2;
    else pts += 1;
    if (igFreq === 3) pts += 6;
    else if (igFreq === 2) pts += 4;
    else if (igFreq === 1) pts += 2;
    if (igReel === 2) pts += 6;
    else if (igReel === 1) pts += 3;
    igScore = Math.min(pts, 20);
    igRating = igScore >= 16 ? '◎' : igScore >= 10 ? '△' : '×';
    igComment = `フォロワー${igFollowers.toLocaleString()}人。投稿頻度：${['未運用','月1〜3回','週1〜2回','週3回以上'][igFreq]}。リール：${['なし','たまにあり','定期投稿あり'][igReel]}。${igScore >= 16 ? '非常に良好な運用状態。' : igScore >= 10 ? 'フォロワー増加とエンゲージメント改善の余地あり。' : 'フォロワー数・投稿頻度ともに強化が必要。'}`;
  }
  items.push({ category:'ALL SNS', name:'Instagram', rating:igRating, score:igScore, max:20, comment:igComment });

  // ── 4. YouTube (10点) ──
  let ytScore=0, ytRating='×', ytComment='';
  if (ytSubs === 0 && ytFreq === 0) {
    ytScore=0; ytRating='×'; ytComment='未運用。施工事例や家づくりノウハウ動画はAIに引用されやすいコンテンツ。';
  } else {
    let pts = 0;
    if (ytSubs >= 1000) pts += 4;
    else if (ytSubs >= 500) pts += 3;
    else if (ytSubs >= 100) pts += 2;
    else pts += 1;
    if (ytFreq === 3) pts += 6;
    else if (ytFreq === 2) pts += 4;
    else if (ytFreq === 1) pts += 2;
    ytScore = Math.min(pts, 10);
    ytRating = ytScore >= 8 ? '◎' : ytScore >= 5 ? '△' : '×';
    ytComment = `登録者${ytSubs.toLocaleString()}人。投稿頻度：${['未運用','不定期','月1〜2回','週1回以上'][ytFreq]}。${ytScore >= 8 ? '良好な運用状態。' : ytScore >= 5 ? '投稿頻度アップで伸びる余地あり。' : '本格的な運用開始が必要。'}`;
  }
  items.push({ category:'ALL SNS', name:'YouTube', rating:ytRating, score:ytScore, max:10, comment:ytComment });

  // ── 5. TikTok (5点) ──
  let ttScore=0, ttRating='×', ttComment='';
  if (ttFollowers === 0 && ttFreq === 0) {
    ttScore=0; ttRating='×'; ttComment='未運用。優先度は低めだが、若い世代への認知拡大に有効。';
  } else {
    let pts = 0;
    if (ttFollowers >= 5000) pts += 2;
    else if (ttFollowers >= 1000) pts += 1;
    if (ttFreq === 2) pts += 3;
    else if (ttFreq === 1) pts += 1;
    ttScore = Math.min(pts, 5);
    ttRating = ttScore >= 4 ? '◎' : ttScore >= 2 ? '△' : '×';
    ttComment = `フォロワー${ttFollowers.toLocaleString()}人。投稿頻度：${['未運用','不定期','月4回以上'][ttFreq]}。`;
  }
  items.push({ category:'ALL SNS', name:'TikTok', rating:ttRating, score:ttScore, max:5, comment:ttComment });

  // ── 6. GBP (20点) ──
  let gbpScore=0, gbpRating='×', gbpComment='';
  {
    let pts = 0;
    if (gbpReviews >= 30) pts += 6;
    else if (gbpReviews >= 20) pts += 5;
    else if (gbpReviews >= 10) pts += 4;
    else if (gbpReviews >= 5)  pts += 2;
    else if (gbpReviews >= 1)  pts += 1;
    if (gbpRatingVal >= 4.5) pts += 4;
    else if (gbpRatingVal >= 4.0) pts += 3;
    else if (gbpRatingVal >= 3.5) pts += 2;
    else if (gbpRatingVal >= 3.0) pts += 1;
    if (gbpPhotos >= 50) pts += 4;
    else if (gbpPhotos >= 30) pts += 3;
    else if (gbpPhotos >= 10) pts += 2;
    else if (gbpPhotos >= 1)  pts += 1;
    if (gbpReply === 2) pts += 3;
    else if (gbpReply === 1) pts += 1;
    if (gbpDesc === 1) pts += 2;
    if (gbpPost === 1) pts += 1;
    gbpScore = Math.min(pts, 20);
    gbpRating = gbpScore >= 16 ? '◎' : gbpScore >= 10 ? '△' : '×';
    gbpComment = `口コミ${gbpReviews}件（評価${gbpRatingVal || '未入力'}）、写真${gbpPhotos}枚。口コミ返信：${['ほぼ未返信','一部返信','ほぼ全件返信'][gbpReply]}。${gbpDesc ? '会社概要あり。' : '会社概要なし。'}${gbpPost ? '投稿あり。' : '投稿なし。'}`;
  }
  items.push({ category:'MEO', name:'Googleビジネスプロフィール', rating:gbpRating, score:gbpScore, max:20, comment:gbpComment });

  // ── 7. お施主様インタビュー (10点) ──
  let intScore=0, intRating='×', intComment='';
  {
    let pts = 0;
    if (intVideo === 2) pts += 6;
    else if (intVideo === 1) pts += 3;
    if (intArticle === 2) pts += 4;
    else if (intArticle === 1) pts += 2;
    intScore = Math.min(pts, 10);
    intRating = intScore >= 8 ? '◎' : intScore >= 4 ? '△' : '×';
    intComment = `動画：${['なし','1〜4本','5本以上'][intVideo]}、記事：${['なし','1〜4件','5件以上'][intArticle]}。${intScore >= 8 ? 'E-E-A-T観点で非常に良好。AIに引用されやすい一次情報コンテンツ。' : intScore >= 4 ? 'さらに件数を増やすことでAI引用率が向上する。' : 'お施主様の生の声はAIが最も引用しやすいコンテンツ。早急に制作開始が必要。'}`;
  }
  items.push({ category:'独自コンテンツ', name:'お施主様インタビュー', rating:intRating, score:intScore, max:10, comment:intComment });

  // ── 8. 独自コンテンツ(FAQ等) (5点) ──
  let faqScore=0, faqRating='×', faqComment='';
  {
    let pts = 0;
    if (faq === 2) pts += 5;
    else if (faq === 1) pts += 2;
    faqScore = pts;
    faqRating = faqScore >= 5 ? '◎' : faqScore >= 2 ? '△' : '×';
    faqComment = `FAQページ：${['なし','あり（簡易）','あり（充実）'][faq]}。${faqScore >= 5 ? 'FAQはAI Overview・Chat GPTで直接引用されやすいコンテンツ。' : faqScore >= 2 ? 'FAQを充実させることでAI引用率が大幅向上。' : 'FAQページがない状態。家づくりのよくある質問を記事化すべき。'}`;
  }
  items.push({ category:'独自コンテンツ', name:'独自コンテンツ(FAQ等)', rating:faqRating, score:faqScore, max:5, comment:faqComment });

  // ── 9. コラム (5点) ──
  let colScore=0, colRating='×', colComment='';
  {
    let pts = 0;
    if (columnCount >= 20) pts += 2;
    else if (columnCount >= 10) pts += 1;
    if (columnFreq === 2) pts += 3;
    else if (columnFreq === 1) pts += 1;
    colScore = Math.min(pts, 5);
    colRating = colScore >= 4 ? '◎' : colScore >= 2 ? '△' : '×';
    colComment = `記事数${columnCount}件、更新頻度：${['なし・停止','不定期','月1回以上'][columnFreq]}。${colScore >= 4 ? '継続的な情報発信でAI引用の土台ができている。' : colScore >= 2 ? '記事数・更新頻度ともに増やすことでAI認知が向上。' : 'コラムはAIが情報収集する主要ソース。定期更新開始が必要。'}`;
  }
  items.push({ category:'独自コンテンツ', name:'コラム', rating:colRating, score:colScore, max:5, comment:colComment });

  // ── 10. PR/メディア掲載 (5点) ──
  let prScore=0, prRating='×', prComment='';
  if (pr === 2)      { prScore=5; prRating='◎'; prComment='年3件以上のメディア掲載。被リンク獲得とブランド信頼性向上に大きく貢献。'; }
  else if (pr === 1) { prScore=2; prRating='△'; prComment='1〜2件のメディア掲載あり。継続的なPR活動でDR向上を狙う。'; }
  else               { prScore=0; prRating='×'; prComment='メディア掲載なし。PRTIMESなどプレスリリース配信でDR向上と認知拡大が期待できる。'; }
  items.push({ category:'PR', name:'プレスリリース/メディア掲載', rating:prRating, score:prScore, max:5, comment:prComment });

  const total = items.reduce((s, i) => s + i.score, 0);
  return { items, total };
}

// 優先対策を生成
function buildPriorities(items) {
  const priorities = [];
  const low = items.filter(i => i.rating === '×').sort((a,b) => b.max - a.max);
  const mid = items.filter(i => i.rating === '△').sort((a,b) => b.max - a.max);
  const all = [...low, ...mid];

  const msgs = {
    'Googleビジネスプロフィール': { title:'GBP強化（最優先）', desc:'口コミ獲得・写真追加・全口コミ返信・投稿開始。最短で点数が伸びる施策。' },
    'ドメインパワー(DR)':        { title:'DR向上（被リンク獲得）', desc:'PRTIMESでのプレスリリース配信・メディア掲載でDRを50以上に引き上げる。' },
    'AIO流入・AIメンション':     { title:'AIO流入の改善', desc:'AIメンションはあるがHP誘導が弱い。構造化データ・FAQ強化でドメイン引用を増やす。' },
    'Instagram':                 { title:'Instagram強化', desc:'フォロワー増加とリール定期投稿（週2回以上）でエンゲージメント改善。' },
    'YouTube':                   { title:'YouTube運用開始', desc:'施工事例・家づくりノウハウ動画を月2本以上投稿。AIに引用されやすい動画コンテンツ。' },
    'TikTok':                    { title:'TikTok運用開始', desc:'若い世代への認知拡大。月4本以上の短尺動画投稿で認知度アップ。' },
    'お施主様インタビュー':       { title:'お施主様インタビュー制作', desc:'動画＋記事セットで5件以上制作。AIが最も引用しやすいE-E-A-Tコンテンツ。' },
    '独自コンテンツ(FAQ等)':     { title:'FAQページ充実', desc:'家づくりのよくある質問を20問以上整備。AI Overview・ChatGPTに直接引用される。' },
    'コラム':                    { title:'コラム定期更新', desc:'月1本以上のペースで専門コンテンツを発信。AIの情報収集源として継続的な更新が必要。' },
    'プレスリリース/メディア掲載':{ title:'PR・メディア掲載', desc:'PRTIMESで月1本配信。被リンク獲得とDR向上に直結する。' },
  };

  all.slice(0, 5).forEach((item, i) => {
    const msg = msgs[item.name] || { title: item.name + 'の改善', desc: item.comment };
    priorities.push({ rank: i + 1, ...msg });
  });
  return priorities;
}

// メイン実行
function runDiagnosis() {
  const client = document.getElementById('clientName').value.trim();
  if (!client) { alert('クライアント名を入力してください。'); return; }

  const v = {
    dr: document.getElementById('dr').value,
    siteRobots:  document.getElementById('siteRobots').value,
    siteSitemap: document.getElementById('siteSitemap').value,
    siteJsonld:  document.getElementById('siteJsonld').value,
    siteOverall: document.getElementById('siteOverall').value,
    igFollowers: document.getElementById('igFollowers').value,
    ytSubs: document.getElementById('ytSubs').value,
    ttFollowers: document.getElementById('ttFollowers').value,
    igFreq: document.getElementById('igFreq').value,
    igReel: document.getElementById('igReel').value,
    ytFreq: document.getElementById('ytFreq').value,
    ttFreq: document.getElementById('ttFreq').value,
    gbpReviews: document.getElementById('gbpReviews').value,
    gbpRating: document.getElementById('gbpRating').value,
    gbpPhotos: document.getElementById('gbpPhotos').value,
    gbpReply: document.getElementById('gbpReply').value,
    gbpDesc: document.getElementById('gbpDesc').value,
    gbpPost: document.getElementById('gbpPost').value,
    interviewVideo: document.getElementById('interviewVideo').value,
    interviewArticle: document.getElementById('interviewArticle').value,
    faq: document.getElementById('faq').value,
    columnCount: document.getElementById('columnCount').value,
    columnFreq: document.getElementById('columnFreq').value,
    pr: document.getElementById('pr').value,
  };

  const result = calcScore(v);
  const priorities = buildPriorities(result.items);
  lastResult = { client, hpUrl: document.getElementById('hpUrl').value.trim(), v, result };

  renderResults(client, result, priorities, v);
}

function renderResults(client, result, priorities, v) {
  const total = result.total;
  const totalEl = document.getElementById('rTotal');
  totalEl.textContent = total;
  totalEl.style.color = total >= 70 ? 'var(--green)' : total >= 40 ? 'var(--yellow)' : 'var(--red)';

  const drEl = document.getElementById('rDr');
  drEl.textContent = v.dr || '—';
  drEl.style.color = (v.dr >= 50) ? 'var(--green)' : (v.dr >= 30) ? 'var(--yellow)' : 'var(--red)';

  const tbody = document.getElementById('scoreBody');
  tbody.innerHTML = '';
  result.items.forEach(item => {
    const rClass = item.rating === '◎' ? 'r-good' : item.rating === '△' ? 'r-mid' : 'r-bad';
    const pct = Math.round((item.score / item.max) * 100);
    const barColor = item.rating === '◎' ? 'var(--green)' : item.rating === '△' ? 'var(--yellow)' : 'var(--red)';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="cat-tag">${item.category}</span></td>
      <td style="white-space:nowrap;font-weight:500">${item.name}</td>
      <td><span class="rating ${rClass}">${item.rating}</span></td>
      <td><span class="score-num">${item.score}/${item.max}</span></td>
      <td style="min-width:80px">
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${pct}%;background:${barColor}"></div>
        </div>
      </td>
      <td><span class="comment">${item.comment}</span></td>
    `;
    tbody.appendChild(tr);
  });

  const pl = document.getElementById('priorityList');
  pl.innerHTML = '';
  priorities.forEach(p => {
    pl.innerHTML += `
      <div class="priority-item">
        <div class="priority-num">${p.rank}</div>
        <div class="priority-content">
          <h4>${p.title}</h4>
          <p>${p.desc}</p>
        </div>
      </div>`;
  });

  document.getElementById('results').className = 'show';
  document.getElementById('gasSection').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// コピー
function copyText() {
  if (!lastResult) return;
  const { client, result } = lastResult;
  let text = `【AIO診断結果】${client}\n総合得点：${result.total}/100\n\n`;
  result.items.forEach(i => {
    text += `[${i.category}] ${i.name}：${i.rating}（${i.score}/${i.max}点）\n${i.comment}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
}

// CSV
function downloadCsv() {
  if (!lastResult) return;
  const { client, hpUrl, result } = lastResult;
  const rows = [['クライアント','HP URL','大分類','項目','評価','点数','配点','所見']];
  result.items.forEach(i => {
    rows.push([client, hpUrl, i.category, i.name, i.rating, i.score, i.max, i.comment]);
  });
  rows.push(['','','','総合点','',result.total,100,'']);
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `AIO診断_${client}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// スプシに保存
async function saveToSheets() {
  if (!lastResult) return;
  const gasUrl = localStorage.getItem('aio_gas_url') || document.getElementById('gasUrl').value.trim();
  if (!gasUrl) { alert('GAS URLを入力・保存してください。'); return; }

  const btn = document.getElementById('sheetsBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  const { client, hpUrl, result } = lastResult;
  const payload = { client, hpUrl, items: result.items, total: result.total };

  try {
    const res = await fetch(gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.status === 'ok') {
      btn.textContent = '✓ スプシに保存しました！';
    } else {
      throw new Error(data.message || '不明なエラー');
    }
  } catch(e) {
    alert('スプシへの保存に失敗しました: ' + e.message);
    btn.textContent = '📊 スプシに保存する';
  } finally {
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '📊 スプシに保存する'; }, 3000);
  }
}
</script>
